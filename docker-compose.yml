version: '3.8'

services:
  # Nginx Reverse Proxy with SSL
  nginx:
    image: nginx:alpine
    container_name: fiperde-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - backend
    networks:
      - fiperde-network
    command: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"

  # Certbot for SSL certificate renewal
  certbot:
    image: certbot/certbot
    container_name: fiperde-certbot
    restart: unless-stopped
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fiperde-backend
    restart: unless-stopped
    # Port no longer exposed to host - only accessible via nginx
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGODB_URI=mongodb://mongodb:27017/fiperde?authSource=admin
      - MONGODB_TEST_URI=mongodb://mongodb-test:27017/fiperde-test?authSource=admin
      - MONGO_USERNAME=${MONGO_ROOT_USERNAME}
      - MONGO_PASSWORD=${MONGO_ROOT_PASSWORD}
      - FIREBASE_SERVICE_ACCOUNT_PATH=/app/firebase-service-account.json
      - DB_NAME=fiperde
      - DB_TEST_NAME=fiperde-test
    volumes:
      - ./firebase-service-account.json:/app/firebase-service-account.json:ro
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - fiperde-network
    healthcheck:
      test: [ "CMD", "bun", "run", "-e", "fetch('http://localhost:3000/health').then(r => r.ok ? process.exit(0) : process.exit(1))" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Production MongoDB (configured as replica set for transaction support)
  mongodb:
    image: mongo:7.0
    container_name: fiperde-mongodb
    restart: unless-stopped
    # Port NOT exposed to host — only accessible within Docker network
    expose:
      - "27017"
    environment:
      - MONGO_INITDB_DATABASE=fiperde
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
    command: [ "--replSet", "rs0", "--bind_ip", "localhost,mongodb", "--auth" ]
    volumes:
      - mongodb-data:/data/db
      - mongodb-config:/data/configdb
    networks:
      - fiperde-network
    healthcheck:
      test: |
        mongosh -u "$MONGO_INITDB_ROOT_USERNAME" -p "$MONGO_INITDB_ROOT_PASSWORD" --authenticationDatabase admin --eval "
        try {
          rs.status();
        } catch(e) {
          rs.initiate({
            _id: 'rs0',
            members: [{ _id: 0, host: 'mongodb:27017' }]
          });
        }
        db.adminCommand('ping');
        "
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    # Test MongoDB (configured as replica set for transaction support)
  mongodb-test:
    image: mongo:7.0
    container_name: fiperde-mongodb-test
    restart: unless-stopped
    # No ports exposed to host
    expose:
      - "27017"
    environment:
      - MONGO_INITDB_DATABASE=fiperde-test
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
    command: [ "--replSet", "rs0-test", "--bind_ip", "localhost,mongodb-test", "--auth" ]
    volumes:
      - mongodb-test-data:/data/db
    networks:
      - fiperde-network
    healthcheck:
      test: |
        mongosh -u "$MONGO_INITDB_ROOT_USERNAME" -p "$MONGO_INITDB_ROOT_PASSWORD" --authenticationDatabase admin --eval "
        try {
          rs.status();
        } catch(e) {
          rs.initiate({
            _id: 'rs0-test',
            members: [{ _id: 0, host: 'mongodb-test:27017' }]
          });
        }
        db.adminCommand('ping');
        "
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

networks:
  fiperde-network:
    driver: bridge

volumes:
  mongodb-data:
    driver: local
  mongodb-config:
    driver: local
  mongodb-test-data:
    driver: local
